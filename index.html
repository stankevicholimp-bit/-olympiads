<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кружок · Поступление в СПбГУ по олимпиадам 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --white: #FFFFFF;
  --bg: #F7F8FA;
  --black: #1A1A1A;
  --blue: #008CFF;
  --green: #1ED760;
  --green-light: #E8FBF0;
  --blue-light: #E6F4FF;
  --purple: #BB6CFF;
  --purple-light: #F3E8FF;
  --pink: #FF6B9D;
  --red: #FF4444;
  --gray100: #F2F3F5;
  --gray200: #E4E6EB;
  --gray300: #C4C8D0;
  --gray500: #8E939E;
  --gray700: #5A5E6A;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}

body {
  background: var(--bg);
  color: var(--black);
  font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ===== HERO ===== */
.hero {
  background: var(--white);
  padding: 40px 24px 36px;
  text-align: center;
  border-bottom: 2px solid var(--gray200);
}

.hero-logo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--green);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-icon svg {
  width: 20px;
  height: 20px;
  fill: white;
}

.logo-text {
  font-size: 1.3rem;
  font-weight: 900;
  letter-spacing: -0.02em;
  color: var(--black);
}

.logo-star {
  color: var(--blue);
  font-size: 1.1rem;
}

.hero h1 {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 900;
  color: var(--blue);
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 10px;
  text-transform: lowercase;
}

.hero p {
  color: var(--gray700);
  font-size: 0.95rem;
  max-width: 560px;
  margin: 0 auto 20px;
  font-weight: 600;
}

.hero-badges {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 700;
  background: var(--green-light);
  color: #0D9B3F;
  border: 1.5px solid #B8EDCB;
}

.hero-badge.blue {
  background: var(--blue-light);
  color: #0068BF;
  border-color: #B0D9FF;
}

.hero-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ===== CONTROLS ===== */
.controls {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
}

.search-wrap {
  flex: 1;
  min-width: 220px;
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray500);
  width: 18px;
  height: 18px;
}

.search-wrap input {
  width: 100%;
  padding: 12px 16px 12px 42px;
  background: var(--white);
  border: 2px solid var(--gray200);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--black);
  outline: none;
  transition: border-color 0.2s;
}

.search-wrap input:focus {
  border-color: var(--blue);
}

.search-wrap input::placeholder {
  color: var(--gray500);
  font-weight: 600;
}

select {
  padding: 12px 16px;
  background: var(--white);
  border: 2px solid var(--gray200);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--black);
  outline: none;
  cursor: pointer;
  min-width: 170px;
  transition: border-color 0.2s;
}

select:focus { border-color: var(--blue); }

.btn-toggle {
  padding: 12px 20px;
  background: var(--black);
  border: none;
  border-radius: var(--radius-sm);
  color: var(--white);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn-toggle:hover {
  background: #333;
}

/* ===== CONTENT ===== */
.content {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px 40px;
}

/* ===== STATS ===== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--white);
  border: 2px solid var(--gray200);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.stat-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

.stat-num {
  font-size: 1.6rem;
  font-weight: 900;
  line-height: 1.1;
}

.stat-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--gray500);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* ===== LEGEND ===== */
.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  padding: 14px 18px;
  background: var(--white);
  border: 2px solid var(--gray200);
  border-radius: var(--radius);
  margin-bottom: 24px;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--gray700);
  align-items: center;
}

/* ===== SECTIONS ===== */
.section {
  margin-bottom: 20px;
}

.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  background: var(--white);
  border: 2px solid var(--gray200);
  border-radius: var(--radius);
  cursor: pointer;
  user-select: none;
  transition: border-color 0.15s;
}

.section-head:hover {
  border-color: var(--blue);
}

.section-code {
  padding: 4px 10px;
  border-radius: 8px;
  background: var(--green);
  color: white;
  font-size: 0.72rem;
  font-weight: 800;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.section-name {
  flex: 1;
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: -0.01em;
}

.section-cnt {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--gray500);
  background: var(--gray100);
  padding: 4px 10px;
  border-radius: 10px;
}

.section-arrow {
  font-size: 0.9rem;
  color: var(--gray500);
  transition: transform 0.25s;
}

.section-arrow.open { transform: rotate(180deg); }

.section-body {
  padding: 8px 0 0;
}

/* ===== PROGRAM CARDS ===== */
.prog-card {
  background: var(--white);
  border: 2px solid var(--gray200);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.15s;
}

.prog-card:hover { border-color: var(--gray300); }

.prog-head {
  padding: 14px 18px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: background 0.1s;
}

.prog-head:hover { background: var(--gray100); }

.prog-title {
  flex: 1;
}

.prog-name {
  font-weight: 800;
  font-size: 0.92rem;
  line-height: 1.35;
  letter-spacing: -0.01em;
}

.prog-code {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--gray500);
  margin-top: 2px;
}

.prog-tag {
  padding: 4px 12px;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 800;
  background: var(--blue-light);
  color: var(--blue);
  white-space: nowrap;
  align-self: center;
}

.prog-arrow {
  color: var(--gray500);
  align-self: center;
  transition: transform 0.25s;
  font-size: 0.9rem;
}

.prog-arrow.open { transform: rotate(180deg); }

.prog-body {
  display: none;
  padding: 0 18px 16px;
}

.prog-body.open { display: block; }

/* ===== EXAMS ===== */
.sub-title {
  font-size: 0.7rem;
  font-weight: 800;
  color: var(--gray500);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  margin-top: 14px;
}

.sub-title:first-child { margin-top: 0; }

.exam-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  font-size: 0.88rem;
}

.exam-num {
  width: 26px;
  height: 26px;
  border-radius: 8px;
  background: var(--green);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 800;
  flex-shrink: 0;
}

.exam-subj {
  flex: 1;
  font-weight: 700;
}

.exam-min {
  font-weight: 800;
  font-size: 0.82rem;
  color: var(--blue);
  min-width: 50px;
  text-align: right;
}

/* ===== OLYMP TABLE ===== */
.olymp-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 0.82rem;
  margin-top: 4px;
}

.olymp-table th {
  text-align: left;
  padding: 8px 8px;
  font-weight: 800;
  color: var(--gray500);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 2px solid var(--gray200);
}

.olymp-table td {
  padding: 7px 8px;
  border-bottom: 1px solid var(--gray100);
  vertical-align: top;
  font-weight: 600;
}

.olymp-table tr:last-child td { border-bottom: none; }

/* Level badges */
.lvl {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 7px;
  font-size: 0.72rem;
  font-weight: 800;
  white-space: nowrap;
}

.lvl-1 { background: var(--green-light); color: #0D9B3F; }
.lvl-12 { background: var(--blue-light); color: #0068BF; }
.lvl-13 { background: var(--purple-light); color: #8B3FC7; }
.lvl-2 { background: #E6F4FF; color: #0068BF; }
.lvl-23 { background: #FFF3E0; color: #C67700; }
.lvl-3 { background: #FFF8E1; color: #B8860B; }

/* Right badges */
.right-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 8px;
  font-size: 0.73rem;
  font-weight: 800;
  white-space: nowrap;
}

.right-bvi {
  background: var(--green);
  color: white;
}

.right-100 {
  background: var(--blue);
  color: white;
}

.right-none {
  background: var(--gray100);
  color: var(--gray500);
}

/* ===== NO RESULTS ===== */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray500);
  font-weight: 700;
}

.no-results span {
  font-size: 2.5rem;
  display: block;
  margin-bottom: 10px;
}

/* ===== ARROW ICON ===== */
.arrow-icon {
  display: inline-flex;
  width: 22px;
  height: 22px;
  background: var(--green);
  border-radius: 50%;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.arrow-icon svg {
  width: 12px;
  height: 12px;
  fill: white;
}

/* ===== MOBILE OLYMPIAD CARDS ===== */
.olymp-cards { display: none; }

.olymp-card {
  background: var(--gray100);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.olymp-card:last-child { margin-bottom: 0; }

.olymp-card-left {
  flex: 1;
  min-width: 0;
}

.olymp-card-profile {
  font-weight: 700;
  font-size: 0.84rem;
  color: var(--black);
  line-height: 1.3;
  margin-bottom: 4px;
}

.olymp-card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 8px;
  font-size: 0.73rem;
  font-weight: 600;
  color: var(--gray700);
  align-items: center;
}

.olymp-card-meta .lvl {
  font-size: 0.68rem;
  padding: 1px 7px;
}

.olymp-card-right {
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

.olymp-card-right .right-badge {
  font-size: 0.75rem;
  padding: 5px 12px;
  border-radius: 10px;
  white-space: nowrap;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .controls { flex-direction: column; }
  select { width: 100%; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .legend { flex-direction: column; gap: 8px; }
  .hero h1 { font-size: 1.4rem; }
  .section-head { flex-wrap: wrap; }
  .prog-body { padding: 0 14px 14px; }
  .prog-head { padding: 12px 14px; }

  /* Hide table, show cards on mobile */
  .olymp-table { display: none; }
  .olymp-cards { display: block; }

  .section-code { font-size: 0.65rem; padding: 3px 8px; }
  .section-name { font-size: 0.88rem; }
  .section-cnt { font-size: 0.68rem; padding: 3px 8px; }
  .prog-name { font-size: 0.86rem; }
  .prog-tag { font-size: 0.65rem; padding: 3px 9px; }
  .exam-row { font-size: 0.82rem; }
}
</style>
</head>

let openSections = new Set(DATA.map(d => d.area));
let openPrograms = new Set();

function getLvlClass(l) {
  if (l === 'I') return 'lvl-1';
  if (l === 'I–II') return 'lvl-12';
  if (l === 'I–III') return 'lvl-13';
  if (l === 'II') return 'lvl-2';
  if (l === 'II–III') return 'lvl-23';
  if (l === 'III') return 'lvl-3';
  return 'lvl-1';
}

function getRightClass(r) {
  if (r.includes('БВИ') && r.includes('100')) return 'right-bvi';
  if (r.includes('БВИ')) return 'right-bvi';
  if (r.includes('100')) return 'right-100';
  return 'right-none';
}

function matches(prog, area, q) {
  if (!q) return true;
  const ql = q.toLowerCase();
  const txt = [prog.code, prog.name, prog.fullName, area.areaName,
    ...prog.exams.map(e => e.subject),
    ...prog.olympiads.map(o => o.profile + ' ' + o.subj + ' ' + o.right)
  ].join(' ').toLowerCase();
  return ql.split(/\s+/).every(w => txt.includes(w));
}

function matchFilters(prog) {
  const rf = document.getElementById('filterRight').value;
  const lf = document.getElementById('filterLevel').value;
  if (rf === 'bvi' && !prog.olympiads.some(o => o.right.includes('БВИ'))) return false;
  if (rf === '100' && !prog.olympiads.some(o => o.right.includes('100'))) return false;
  if (lf !== 'all') {
    const check = l => {
      if (lf === 'I') return l === 'I';
      if (lf === 'II') return ['I','I–II','II'].includes(l);
      return true;
    };
    if (!prog.olympiads.some(o => check(o.level))) return false;
  }
  return true;
}

function render() {
  const q = document.getElementById('search').value;
  const el = document.getElementById('content');
  let total = 0, bviCount = 0;
  let html = '';

  DATA.forEach(area => {
    const progs = area.programs.filter(p => matches(p, area, q) && matchFilters(p));
    if (!progs.length) return;
    total += progs.length;
    progs.forEach(p => { if (p.olympiads.some(o => o.right.includes('БВИ'))) bviCount++; });

    const sOpen = openSections.has(area.area);
    html += `<div class="section">
      <div class="section-head" onclick="togSec('${area.area}')">
        <span class="section-code">${area.area}</span>
        <span class="section-name">${area.areaName}</span>
        <span class="section-cnt">${progs.length} прогр.</span>
        <span class="section-arrow ${sOpen?'open':''}">▼</span>
      </div>`;

    if (sOpen) {
      html += '<div class="section-body">';
      progs.forEach((p, i) => {
        const pk = area.area + '-' + i;
        const po = openPrograms.has(pk);
        html += `<div class="prog-card">
          <div class="prog-head" onclick="togProg('${pk}')">
            <div class="prog-title">
              <div class="prog-name">${p.fullName}</div>
              <div class="prog-code">${p.code} · ${p.name}</div>
            </div>
            <span class="prog-tag">${p.form} · ${p.level}</span>
            <span class="prog-arrow ${po?'open':''}">▼</span>
          </div>
          <div class="prog-body ${po?'open':''}">
            <div class="sub-title">Вступительные испытания</div>
            ${p.exams.map(e => `
              <div class="exam-row">
                <div class="exam-num">${e.n}</div>
                <div class="exam-subj">${e.subject}</div>
                <div class="exam-min">${e.min ? '≥ '+e.min : '—'}</div>
              </div>`).join('')}
            <div class="sub-title" style="margin-top:16px">Олимпиады → особые права</div>
            <table class="olymp-table">
              <tr><th>Ур.</th><th>Профиль олимпиады</th><th>Предмет</th><th>Статус</th><th>Право</th></tr>
              ${p.olympiads.map(o => `
                <tr>
                  <td><span class="lvl ${getLvlClass(o.level)}">${o.level}</span></td>
                  <td>${o.profile}</td>
                  <td>${o.subj}</td>
                  <td>${o.who}</td>
                  <td><span class="right-badge ${getRightClass(o.right)}">${o.right}</span></td>
                </tr>`).join('')}
            </table>
            <div class="olymp-cards">
              ${p.olympiads.map(o => `
                <div class="olymp-card">
                  <div class="olymp-card-left">
                    <div class="olymp-card-profile">${o.profile}</div>
                    <div class="olymp-card-meta">
                      <span class="lvl ${getLvlClass(o.level)}">${o.level} ур.</span>
                      <span>ЕГЭ: ${o.subj}</span>
                      <span>· ${o.who}</span>
                    </div>
                  </div>
                  <div class="olymp-card-right">
                    <span class="right-badge ${getRightClass(o.right)}">${o.right}</span>
                  </div>
                </div>`).join('')}
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  });

  if (!html) html = '<div class="no-results"><span>🔍</span>Ничего не найдено — попробуй другой запрос</div>';

  const stats = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--blue-light)">📚</div>
        <div><div class="stat-num" style="color:var(--blue)">${total}</div><div class="stat-label">Программ найдено</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--green-light)">🎯</div>
        <div><div class="stat-num" style="color:#0D9B3F">${bviCount}</div><div class="stat-label">С правом БВИ</div></div>
      </div>
    </div>
    <div class="legend">
      <span class="right-badge right-bvi">БВИ</span> без вступительных &nbsp;
      <span class="right-badge right-100">100 баллов</span> максимум за ВИ &nbsp;
      <span class="lvl lvl-1">I</span>
      <span class="lvl lvl-12">I–II</span>
      <span class="lvl lvl-13">I–III</span> уровень олимпиады
    </div>`;

  el.innerHTML = stats + html;
}

function togSec(a) {
  openSections.has(a) ? openSections.delete(a) : openSections.add(a);
  render();
}
function togProg(k) {
  openPrograms.has(k) ? openPrograms.delete(k) : openPrograms.add(k);
  render();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filterRight').addEventListener('change', render);
document.getElementById('filterLevel').addEventListener('change', render);
document.getElementById('toggleAll').addEventListener('click', () => {
  const btn = document.getElementById('toggleAll');
  if (openSections.size > 0) {
    openSections.clear(); openPrograms.clear();
    btn.textContent = 'развернуть всё ↑';
  } else {
    DATA.forEach(d => openSections.add(d.area));
    btn.textContent = 'свернуть всё ↓';
  }
  render();
});

render();
</script>
